version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ondina_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ondina_dev
    ports:
      - "5433:5432" # Porta host:container, evita conflito local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./ondina_api
    container_name: ondina_api
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./ondina_api:/app
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ondina_dev
      - POSTGRES_HOST=db
    restart: unless-stopped

  web:
    build:
      context: ./ondina_web
    container_name: ondina_web
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./ondina_web:/app
    restart: unless-stopped

volumes:
  postgres_data:
